<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gumshoe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a1a1a;
      color: #d4c9a8;
      font-family: 'Georgia', serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    header {
      padding: 16px 24px;
      border-bottom: 1px solid #333;
      font-size: 1.1rem;
      letter-spacing: 0.05em;
      color: #a89060;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .message {
      max-width: 70%;
      padding: 12px 16px;
      border-radius: 4px;
      line-height: 1.6;
      white-space: pre-wrap;
    }

    .user {
      align-self: flex-end;
      background: #2a2a2a;
      border: 1px solid #444;
    }

    .assistant {
      align-self: flex-start;
      background: #222;
      border-left: 3px solid #a89060;
    }

    #status {
      padding: 6px 24px;
      font-size: 0.75rem;
      color: #666;
      border-top: 1px solid #2a2a2a;
      min-height: 24px;
    }

    #input-row {
      display: flex;
      gap: 8px;
      padding: 16px 24px;
      border-top: 1px solid #333;
    }

    #input {
      flex: 1;
      background: #222;
      border: 1px solid #444;
      color: #d4c9a8;
      padding: 10px 14px;
      font-family: inherit;
      font-size: 1rem;
      border-radius: 4px;
      outline: none;
    }

    #input:focus { border-color: #a89060; }

    #send {
      background: #a89060;
      color: #1a1a1a;
      border: none;
      padding: 10px 20px;
      font-family: inherit;
      font-size: 1rem;
      border-radius: 4px;
      cursor: pointer;
    }

    #send:disabled { opacity: 0.4; cursor: default; }
  </style>
</head>
<body>

<header>Gumshoe &mdash; AI Detective</header>

<div id="chat"></div>

<div id="status"></div>

<div id="input-row">
  <input id="input" type="text" placeholder="What've you got for me, kid?" autofocus />
  <button id="send">Send</button>
</div>

<script>
  const chat = document.getElementById('chat');
  const input = document.getElementById('input');
  const send = document.getElementById('send');
  const status = document.getElementById('status');

  function appendMessage(role, text) {
    const div = document.createElement('div');
    div.className = `message ${role}`;
    div.textContent = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }

  async function sendMessage() {
    const text = input.value.trim();
    if (!text) return;

    input.value = '';
    input.disabled = true;
    send.disabled = true;
    status.textContent = 'Thinking...';

    appendMessage('user', text);

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text }),
      });

      const data = await res.json();
      appendMessage('assistant', data.response);
      status.textContent = `tokens: ${data.in_tokens} in, ${data.out_tokens} out | session: ${data.total_tokens}`;
    } catch (err) {
      status.textContent = 'Error — check the server.';
    } finally {
      input.disabled = false;
      send.disabled = false;
      input.focus();
    }
  }

  send.addEventListener('click', sendMessage);
  input.addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });
</script>

</body>
</html>
